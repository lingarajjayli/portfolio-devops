#
# Docker Compose Configuration
# Complete stack for frontend, backend, database, and worker services
#

version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: ./docker
      dockerfile: Dockerfile.frontend
      args:
        NODE_ENV: production
        BUILD_NUMBER: ${BUILD_NUMBER:-1}
    image: ${DOCKER_REGISTRY:-devops-portfolio}.frontend:${VERSION:-latest}
    container_name: devops-frontend
    networks:
      - frontend
      - backend
      - database
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - CACHE_TTL=300
    volumes:
      - ./docker/logs:/var/log/nginx:ro
      - frontend-data:/var/cache/nginx:rw
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API Service
  backend:
    build:
      context: ./docker
      dockerfile: Dockerfile.backend
      args:
        PYTHON_VERSION: 3.11
        PYTHON_PIP_VERSION: 23.2
    image: ${DOCKER_REGISTRY:-devops-portfolio}.backend:${VERSION:-latest}
    container_name: devops-backend
    networks:
      - frontend
      - backend
      - database
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://user:password@database:5432/appdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - API_KEY=${API_KEY:-changeme}
    volumes:
      - backend-data:/var/lib/gunicorn
    depends_on:
      - database
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Database Service
  database:
    build:
      context: ./docker
      dockerfile: Dockerfile.db
    image: ${DOCKER_REGISTRY:-devops-portfolio}.database:${VERSION:-latest}
    container_name: devops-database
    networks:
      - database
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=appdb
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache Service
  redis:
    image: redis:alpine
    container_name: devops-redis
    networks:
      - backend
      - database
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Worker Service
  worker:
    build:
      context: ./docker
      dockerfile: Dockerfile.worker
    image: ${DOCKER_REGISTRY:-devops-portfolio}.worker:${VERSION:-latest}
    container_name: devops-worker
    networks:
      - backend
      - database
    environment:
      - QUEUE_URL=redis://redis:6379
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379
      - CELERY_RESULT_BACKEND=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx-proxy:
    image: nginx:alpine
    container_name: devops-nginx-proxy
    networks:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/configs/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Networks
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge

# Volumes
volumes:
  frontend-data:
  backend-data:
  db-data:
  redis-data:
