---
# External Secrets Operator (example)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-external-secret
  namespace: devops-portfolio
  labels:
    app: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: app-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: app-credentials
        property: password
        decryption:
          provider: aws-kms
          serviceAccountRef:
            name: external-secrets-sa
    - secretKey: database
      remoteRef:
        key: app-credentials
        property: database

---
# Secret Store (example for AWS Secrets Manager)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  namespace: devops-portfolio
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      role: arn:aws:iam::123456789012:role/external-secrets-role
      endpoints:
        - url: https://secretsmanager.us-east-1.amazonaws.com
