#
# CI/CD Pipeline
# GitHub Actions workflow for automated CI/CD pipeline
#

name: CI/CD Pipeline

on:
  push:
    branches: [master, develop, feature/*]
  pull_request:
    branches: [master, develop]

jobs:
  # Job 1: Code Quality
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security scan (Snyk)
        uses: snyk/actions/node@latest
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        options: --severity=high

  # Job 2: Tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate coverage report
        run: npm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Job 3: Docker Build
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          tags: |
            devops-portfolio/frontend:latest
            devops-portfolio/frontend:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            devops-portfolio/backend:latest
            devops-portfolio/backend:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: true
          tags: |
            devops-portfolio/worker:latest
            devops-portfolio/worker:${{ github.sha }}

      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devops-portfolio/frontend:latest'
          format: 'sarif'
          output: 'trivy-results-sarif.json'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results-sarif.json

  # Job 4: Kubernetes Deploy
  kubernetes-deploy:
    name: Kubernetes Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          namespace: devops-portfolio
          context: ${{ secrets.KUBECTL_CONTEXT }}
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/frontend -n devops-portfolio
          kubectl rollout status deployment/backend -n devops-portfolio

      - name: Run smoke tests
        run: |
          kubectl run smoke-test --image=alpine:latest -- rm -f /etc/resolv.conf
          kubectl exec -it smoke-test -- /bin/sh -c "apk add wget && wget http://${{ vars.HOSTNAME }}/health"
          kubectl delete pod smoke-test

  # Job 5: Terraform Deploy
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Get Terraform modules
        run: |
          terraform init -backend=false

      - name: Terraform Plan
        run: |
          terraform plan -out=tfplan
          terraform show

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          terraform apply -auto-approve tfplan

      - name: Store Terraform state
        uses: actions/upload-artifact@v3
        with:
          name: terraform-state
          path: |
            terraform/*.tfstate
            terraform/*.tfstate.backup

  # Job 6: Release
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get release notes
        id: release-notes
        uses: bruceadams/release-notes@v1.2.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.ref_name }}
          name: Release v${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.release_notes }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on Slack
        if: ${{ success() }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: ${{ toJSON(steps.release-notes.outputs.release_notes) }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job 7: Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devops-portfolio/frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run OWASP ZAP
        uses: zaproxy/action-baseline@v0.2.0
        with:
          target: 'http://localhost:8080'

      - name: Run dependency check
        uses: dependency-check/dependency-check-action@v16

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results-sarif.json
