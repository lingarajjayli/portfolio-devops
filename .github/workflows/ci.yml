name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, feature/*]
  pull_request:
    branches: [main, master, develop]

jobs:
  # Job 1: Code Quality Only (Basic)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci || echo "Skipping npm ci" || true
        continue-on-error: true

      - name: Lint (if available)
        run: npm run lint || echo "Lint not available" || true
        continue-on-error: true

      - name: Run tests (if available)
        run: npm test || echo "Tests not available" || true
        continue-on-error: true

  # Docker Build (Requires Secrets)
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.DOCKER_USERNAME
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  # Kubernetes Deploy (Development Only)
  kubernetes-deploy:
    name: Kubernetes Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.KUBECONFIG
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          namespace: devops-portfolio
          context: ${{ secrets.KUBECTL_CONTEXT }}
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Apply Kubernetes configurations
        run: |
          kubectl apply -f k8s/ -n devops-portfolio || true

  # Documentation Build
  docs-build:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || true

      - name: Build documentation
        run: npm run docs:build || true

      - name: Upload documentation
        uses: actions/upload-artifact@v3
        if: ${{ success() }}
        with:
          name: documentation
          path: docs/

# Workflow settings
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
