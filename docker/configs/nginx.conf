#
# Nginx Configuration
# Production-ready nginx configuration for frontend service
#

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types application/atom+xml application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/xml application/xml-dtd application/x-javascript text/xml text/css text/javascript text/plain application/xml+rss text/x-component;

    # Rate limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn 10;

    # Logging configuration
    log_rotate off;

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
}

# Include site configuration
include /etc/nginx/sites-available/*;
